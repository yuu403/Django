<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container d-flex justify-content-between">

        <!-- 左側 -->
        <div>
            <a class="navbar-brand" href="{% url 'task_list' %}">Task Manager</a>
            {% if user.is_authenticated %}
                <a class="btn btn-outline-light ms-2" href="{% url 'task_create' %}">＋ 追加</a>
            {% endif %}
        </div>

        <!-- 右側 -->
        <div>
            {% if user.is_authenticated %}
                <span class="text-light me-2">{{ user.username }}</span>

                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button class="btn btn-outline-light">ログアウト</button>
                </form>

            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light">ログイン</a>
                <a href="{% url 'signup' %}" class="btn btn-light">新規登録</a>
            {% endif %}
        </div>

    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
