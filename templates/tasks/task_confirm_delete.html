{% extends 'tasks/base.html' %}

{% block content %}

<div class="card p-4">
    <h3 class="text-danger">削除確認</h3>

    <p>「{{ object.title }}」を削除しますか？</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">削除</button>
        <a href="{% url 'task_list' %}" class="btn btn-secondary">キャンセル</a>
    </form>
</div>

{% endblock %}
